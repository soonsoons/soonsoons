name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Exécution quotidienne à minuit
  workflow_dispatch:      # Permet de lancer le workflow manuellement
  push:
    branches:
      - main              # Exécution à chaque push sur la branche main

jobs:
  generate:
    permissions:
      contents: write     # Requis pour pouvoir pousser les fichiers générés
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
